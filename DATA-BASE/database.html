<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>


<body>

    <header class="header">
    <h1>Student evaluation form</h1>
    </header>

    <form class="container">
        <div class="container1">
        <label for="fname">Full name:</label>
        <input type="text"><br>
        <label for="studentID">Student ID:</label>
        <input type="text"><br>
        <label for="email">Email Address</label>
        <input type="email"><br>
        <h3>Gender</h3>
        <label for="gender">Male</label>
        <input type="radio"><br>
        <label for="Female">Female</label>
        <input type="radio"><br>
        <label for="unknown">Prefer not to say</label>
        <input type="radio"><br>
        <h3>Year Level</h3>
        <input type="checkbox">
        <label for="1st">1st Year</label><br>
        <input type="checkbox">
        <label for="2nd">2nd Year</label><br>
        <input type="checkbox">
        <label for="3rd">3rd Year</label><br>
        <input type="checkbox">
        <label for="4th">4th Year</label><br>
        </div>

        <div class="container2">
            <P>On a scale of 1 to 10 am I handsome?</P>
         
            <input type="radio" name="rating">
            <label for="one">1</label>
            <input type="radio" name="rating">
            <label for="two">2</label>
            <input type="radio" name="rating">
            <label for="three">3</label>
            <input type="radio" name="rating">
            <label for="four">4</label>
            <input type="radio" name="rating">
            <label for="five">5</label>
            <input type="radio" name="rating">
            <label for="six">6</label>
            <input type="radio" name="rating">
            <label for="seven">7</label>
            <input type="radio" name="rating">
            <label for="eight">8</label>
            <input type="radio" name="rating">
            <label for="nine">9</label>
            <input type="radio" name="rating">
            <label for="ten">10</label>
        
            
            <p>Feedback:</p>
            <input type="text">
            <p>Are you enjoying college?</p>
            
            <input type="checkbox">
            <label for="yes">Yes</label>
            <input type="checkbox">
            <label for="no">No</label><br>
            
            <input type="submit" value="submit">
            <input type="reset" value="cancel">
   
    
        </div>
    </form>
    
</body>
</html>
